<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compteur Couple</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f8f9fa; }
        .container { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .counter { font-size: 3rem; display: block; margin: 15px 0; font-weight: bold; }
        button { border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; width: 100%; }
        .rose { background-color: #ff85a2; }
        .bleu { background-color: #5dade2; }
    </style>
</head>
<body>

    <h1>Compteur Partagé</h1>

    <div class="container">
        <div class="box">
            <h2 id="name-rose">FEMME</h2>
            <span id="score-rose" class="counter">0</span>
            <button id="btn-rose" class="rose" onclick="updateScore('rose')">+1</button>
        </div>

        <div class="box">
            <h2 id="name-bleu">HOMME</h2>
            <span id="score-bleu" class="counter">0</span>
            <button id="btn-bleu" class="bleu" onclick="updateScore('bleu')">+1</button>
        </div>
    </div>

    <script>
        const GIST_ID = "ee9ff3d32a7167eda2fceeef62dd76fb";
        const TOKEN = "ghp_dz2nwQw2fYF8kN0Cyhs2hIu1g8Ftlw1q3Php";

        window.onload = () => {
            const nom = prompt("Entrez votre prénom :");
            const sexe = prompt("Êtes-vous un HOMME ou une FEMME ?").toUpperCase();

            if (sexe === "FEMME") {
                document.getElementById('name-rose').innerText = nom;
            } else if (sexe === "HOMME") {
                document.getElementById('name-bleu').innerText = nom;
            }
            loadScores();
        };

        async function loadScores() {
            // Lecture directe via l'URL brute pour éviter les erreurs API
            const response = await fetch(`https://gist.githubusercontent.com/Metaplik/${GIST_ID}/raw/scores.json?cache_bust=${new Date().getTime()}`);
            const scores = await response.json();
            document.getElementById('score-rose').innerText = scores.rose;
            document.getElementById('score-bleu').innerText = scores.bleu;
        }

        async function updateScore(user) {
            // 1. Lire les scores actuels
            const getResponse = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${TOKEN}` }
            });
            const data = await getResponse.json();
            let scores = JSON.parse(data.files['scores.json'].content);
            
            // 2. Modifier le score
            scores[user]++;

            // 3. Envoyer la mise à jour
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    files: { 'scores.json': { content: JSON.stringify(scores) } }
                })
            });
            loadScores();
        }

        setInterval(loadScores, 5000);
    </script>
</body>
</html>
